name: vuln

on:
  push:
    branches: [main]
  schedule:
    # Daily at 07:23 UTC — off the top of the hour to dodge cron stampedes.
    - cron: "23 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          check-latest: false
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: run govulncheck
        run: govulncheck ./...
