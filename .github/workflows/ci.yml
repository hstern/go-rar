name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.3"

jobs:
  static:
    name: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
      - name: gofmt drift
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            printf '::error::gofmt drift in:\n%s\n' "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go mod tidy drift
        run: go mod tidy -diff

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
      - name: go test
        run: go test -race -shuffle=on ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.1

  example:
    name: example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
      # example/three-flow/ is its own Go module so the library's
      # go.mod / go.sum stay free of example-only deps. Build and
      # vet from inside the module directory; the replace directive
      # in its go.mod points at ../.. so this builds against the
      # checked-out library source rather than the published tag.
      - name: example go vet
        working-directory: example/three-flow
        run: go vet ./...
      - name: example go build
        working-directory: example/three-flow
        run: go build ./...
